name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Aacharya-website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Aacharya-website/package-lock.json
            Aacharya-website/client/package-lock.json
            Aacharya-website/server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci
        working-directory: Aacharya-website/client

      - name: Install server dependencies
        run: npm ci
        working-directory: Aacharya-website/server

      - name: Build client
        run: npm run build
        working-directory: Aacharya-website/client

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: Aacharya-website/client/dist

      - name: Verify server syntax
        run: node --check index.js
        working-directory: Aacharya-website/server
